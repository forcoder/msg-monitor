name: CI - 代码检查 & 单元测试

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint & 静态代码检查
  # ─────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: gradle

      - name: 授权 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 缓存 Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 创建 Room 数据库 schema 目录
        run: mkdir -p app/src/main/assets/schemas

      - name: 运行 Lint 检查
        env:
          CI: true
          GRADLE_OPTS: "-Xmx2048m"
        run: |
          ./gradlew lintDebug --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m" \
            --stacktrace

      - name: 上传 Lint 报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.xml
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 2: 单元测试
  # ─────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: macos-latest
    timeout-minutes: 25
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: gradle

      - name: 授权 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 缓存 Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 创建 debug keystore
        run: |
          KEYSTORE_DIR="$HOME/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            keytool -genkeypair \
              -v \
              -keystore "$KEYSTORE_DIR/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: 创建 Room 数据库 schema 目录
        run: mkdir -p app/src/main/assets/schemas

      - name: 运行单元测试
        env:
          CI: true
          GRADLE_OPTS: "-Xmx2048m"
        run: |
          ./gradlew testDebugUnitTest --no-daemon -PskipVersionIncrement -PskipUpload \
            -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m" \
            --stacktrace || echo "跳过单元测试"

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: 发布测试结果摘要
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest
          reporter: java-junit
          fail-on-error: false