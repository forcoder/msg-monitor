name: Release - 上传到 shz.al

on:
  # 打 tag 时自动触发（如 v1.1.70）
  push:
    tags:
      - 'v*.*.*'
  # 也可以手动触发
  workflow_dispatch:
    inputs:
      expire_days:
        description: '文件有效期（如 7d / 30d / 永久留空）'
        required: false
        default: '7d'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # Release 不允许并发取消

jobs:
  # ─────────────────────────────────────────
  # Job 1: 构建 Release APK
  # ─────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: macos-latest
    timeout-minutes: 50
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}
      apk_path:     ${{ steps.rename.outputs.apk_path }}
      apk_name:     ${{ steps.rename.outputs.apk_name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: gradle

      - name: 授权 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 缓存 Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 读取版本信息
        id: version
        run: |
          VERSION_CODE=$(grep 'APP_VERSION_CODE' gradle.properties | cut -d'=' -f2)
          VERSION_NAME=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2)
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 构建版本: v$VERSION_NAME ($VERSION_CODE)"

      - name: 构建 Release APK（跳过混淆，Debug 签名）
        env:
          CI: true
          GRADLE_OPTS: "-Xmx2048m"
        run: |
          ./gradlew assembleRelease --no-daemon -PskipVersionIncrement -PskipUpload \
            -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m" \
            --stacktrace

      - name: 重命名并记录 APK 路径
        id: rename
        run: |
          APK_SRC="app/build/outputs/apk/release/app-release-unsigned.apk"
          # 兼容已配置签名的场景
          [ -f "app/build/outputs/apk/release/app-release.apk" ] && \
            APK_SRC="app/build/outputs/apk/release/app-release.apk"
          APK_NAME="csBaby-v${{ steps.version.outputs.name }}.apk"
          APK_DST="app/build/outputs/apk/release/$APK_NAME"
          mv "$APK_SRC" "$APK_DST"
          echo "apk_path=$APK_DST" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME"  >> $GITHUB_OUTPUT
          echo "APK_SIZE=$(du -sh $APK_DST | cut -f1)" >> $GITHUB_ENV

      - name: 上传 APK Artifact（供后续 Job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

  # ─────────────────────────────────────────
  # Job 2: 上传到 shz.al
  # ─────────────────────────────────────────
  upload-shzal:
    name: Deploy to shz.al
    runs-on: macos-latest
    timeout-minutes: 10
    needs: build-release

    steps:
      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./apk-output

      - name: 检查 APK 并计算 MD5
        id: apk
        run: |
          echo "当前目录: $(pwd)"
          echo "apk-output 内容:"
          ls -la ./apk-output/
          echo ""
          # 查找 APK 文件
          APK_FILE=$(find ./apk-output -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "错误: 未找到 APK 文件!"
            ls -la ./apk-output/
            exit 1
          fi
          echo "找到 APK: $APK_FILE"
          echo "文件大小: $(wc -c < "$APK_FILE") bytes"
          # macOS md5 输出格式: MD5 (file) = hash
          MD5=$(md5 "$APK_FILE" | sed 's/.*= //')
          echo "MD5: $MD5"
          echo "path=$APK_FILE" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "size=$(wc -c < "$APK_FILE")" >> $GITHUB_OUTPUT

      - name: 生成 version-info.json
        run: |
          EXPIRE="${{ inputs.expire_days || '7d' }}"
          cat > version-info.json << EOF
          {
            "versionCode": ${{ needs.build-release.outputs.version_code }},
            "versionName": "${{ needs.build-release.outputs.version_name }}",
            "releaseDate": "$(date +%Y-%m-%d)",
            "fileSize": ${{ steps.md5.outputs.size }},
            "md5": "${{ steps.md5.outputs.md5 }}",
            "downloadUrl": "https://shz.al/~csBabyApk",
            "releaseNotes": "v${{ needs.build-release.outputs.version_name }} 更新",
            "forceUpdate": false
          }
          EOF
          cat version-info.json

      - name: 上传版本信息到 shz.al
        env:
          SHZAL_PASSWORD: ${{ secrets.SHZAL_PASSWORD }}
        run: |
          EXPIRE="${{ inputs.expire_days || '7d' }}"
          # 先删除旧文件
          curl -s -X DELETE "https://shz.al/~csBabyLog:${SHZAL_PASSWORD}" || true
          # 上传新版本信息
          RESP=$(curl -s -X POST \
            -F "n=csBabyLog" \
            -F "e=${EXPIRE}" \
            -F "c=@version-info.json" \
            -F "s=${SHZAL_PASSWORD}" \
            https://shz.al)
          echo "版本信息上传响应: $RESP"
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ 版本信息已上传:', d.get('url',''))" || echo "$RESP"

      - name: 上传 APK 到 shz.al
        env:
          SHZAL_PASSWORD: ${{ secrets.SHZAL_PASSWORD }}
        run: |
          EXPIRE="${{ inputs.expire_days || '7d' }}"
          # 先删除旧 APK
          curl -s -X DELETE "https://shz.al/~csBabyApk:${SHZAL_PASSWORD}" || true
          # 上传新 APK
          RESP=$(curl -s -X POST \
            -F "n=csBabyApk" \
            -F "e=${EXPIRE}" \
            -F "filename=${{ needs.build-release.outputs.apk_name }}" \
            -F "c=@${{ steps.apk.outputs.path }}" \
            -F "s=${SHZAL_PASSWORD}" \
            https://shz.al)
          echo "APK 上传响应: $RESP"
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ APK 已上传:', d.get('url',''))" || echo "$RESP"

      - name: 输出部署摘要
        run: |
          echo "## 🚀 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 字段 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | v${{ needs.build-release.outputs.version_name }} (${{ needs.build-release.outputs.version_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | ${{ needs.build-release.outputs.apk_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MD5 | ${{ steps.md5.outputs.md5 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 版本信息 | https://shz.al/~csBabyLog |" >> $GITHUB_STEP_SUMMARY
          echo "| APK 下载 | https://shz.al/~csBabyApk |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # Job 3: 创建 GitHub Release（打 tag 时触发）
  # ─────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    runs-on: macos-latest
    timeout-minutes: 5
    needs: [ build-release, upload-shzal ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./apk-output

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "客服小秘 v${{ needs.build-release.outputs.version_name }}"
          body: |
            ## 📦 客服小秘 v${{ needs.build-release.outputs.version_name }}

            **版本号：** ${{ needs.build-release.outputs.version_code }}
            **发布日期：** $(date +%Y-%m-%d)

            ### 下载
            - 📥 **直接下载（7天有效）：** https://shz.al/~csBabyApk
            - 📋 **版本信息：** https://shz.al/~csBabyLog

            ### 变更内容
            > 请在此补充本版本的主要变更

          files: ./apk-output/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true