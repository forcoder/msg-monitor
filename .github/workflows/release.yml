name: Release - 上传到 shz.al

on:
  # 打 tag 时自动触发（如 v1.1.70）
  push:
    tags:
      - 'v*.*.*'
  # 也可以手动触发
  workflow_dispatch:
    inputs:
      expire_days:
        description: '文件有效期（如 7d / 30d / 永久留空）'
        required: false
        default: '7d'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # Release 不允许并发取消

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # Job 1: 构建 Release APK
  # ─────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: macos-latest
    timeout-minutes: 50
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}
      apk_path:     ${{ steps.rename.outputs.apk_path }}
      apk_name:     ${{ steps.rename.outputs.apk_name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: gradle

      - name: 授权 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 缓存 Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 创建 debug keystore（如果没有）
        run: |
          KEYSTORE_DIR="$HOME/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            keytool -genkeypair \
              -v \
              -keystore "$KEYSTORE_DIR/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: 读取版本信息
        id: version
        run: |
          VERSION_CODE=$(grep 'APP_VERSION_CODE' gradle.properties | cut -d'=' -f2)
          VERSION_NAME=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2)
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 当前版本: v$VERSION_NAME ($VERSION_CODE)"

      - name: 递增版本号
        id: bump
        run: |
          CUR_CODE=$(grep 'APP_VERSION_CODE' gradle.properties | cut -d'=' -f2)
          CUR_NAME=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2)
          NEW_CODE=$((CUR_CODE + 1))
          IFS='.' read -ra PARTS <<< "$CUR_NAME"
          if [ ${#PARTS[@]} -ge 3 ]; then
            NEW_PATCH=$((PARTS[2] + 1))
            NEW_NAME="${PARTS[0]}.${PARTS[1]}.$NEW_PATCH"
          else
            NEW_NAME="$CUR_NAME"
          fi
          sed -i '' "s/APP_VERSION_CODE=.*/APP_VERSION_CODE=$NEW_CODE/" gradle.properties
          sed -i '' "s/APP_VERSION_NAME=.*/APP_VERSION_NAME=$NEW_NAME/" gradle.properties
          echo "new_code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "new_name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "🚀 版本升级: v$CUR_NAME → v$NEW_NAME"

      - name: 构建 Release APK（跳过混淆，Debug 签名）
        env:
          CI: true
          GRADLE_OPTS: "-Xmx2048m"
        run: |
          ./gradlew assembleRelease --no-daemon -PskipVersionIncrement -PskipUpload \
            -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m" \
            --stacktrace

      - name: 签名 APK（如果未签名）
        run: |
          # 检查是否已存在签名APK
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "✅ 已存在签名APK，跳过签名步骤"
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "⚠️  警告: GitHub Actions 环境中缺少 apksigner，无法签名APK"
            echo "💡 提示: 请确保在本地使用完整Android SDK环境进行正式签名"
            echo "🔍 使用未签名APK继续..."
            cp "app/build/outputs/apk/release/app-release-unsigned.apk" "app/build/outputs/apk/release/app-release.apk"
          else
            echo "❌ 未找到APK文件"
            exit 1
          fi

      - name: 重命名并记录 APK 路径
        id: rename
        run: |
          # 优先使用已签名的 APK
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            APK_SRC="app/build/outputs/apk/release/app-release.apk"
          else
            APK_SRC="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          APK_NAME="csBaby-v${{ steps.bump.outputs.new_name }}.apk"
          APK_DST="app/build/outputs/apk/release/$APK_NAME"
          cp "$APK_SRC" "$APK_DST"
          echo "apk_path=$APK_DST" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME"  >> $GITHUB_OUTPUT
          echo "new_code=${{ steps.bump.outputs.new_code }}" >> $GITHUB_OUTPUT
          echo "new_name=${{ steps.bump.outputs.new_name }}" >> $GITHUB_OUTPUT
          echo "APK_SIZE=$(du -sh $APK_DST | cut -f1)" >> $GITHUB_ENV

      - name: 提交版本号变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          MSG="chore: bump version to v${{ steps.bump.outputs.new_name }} (${{ steps.bump.outputs.new_code }}) [skip ci]"
          git diff --cached --quiet || (git commit -m "$MSG" && git pull --rebase origin main && git push) || echo "版本更新已存在或合并冲突，继续..."

      - name: 上传 APK Artifact（供后续 Job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

  # ─────────────────────────────────────────
  # Job 2: 上传到 shz.al
  # ─────────────────────────────────────────
  upload-shzal:
    name: Deploy to shz.al
    runs-on: macos-latest
    timeout-minutes: 10
    needs: build-release

    steps:
      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./apk-output

      - name: 检查 APK 并计算 MD5
        id: apk
        run: |
          echo "当前目录: $(pwd)"
          echo "apk-output 内容:"
          ls -la ./apk-output/
          echo ""
          # 查找 APK 文件
          APK_FILE=$(find ./apk-output -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "错误: 未找到 APK 文件!"
            ls -la ./apk-output/
            exit 1
          fi
          echo "找到 APK: $APK_FILE"
          echo "文件大小: $(wc -c < "$APK_FILE") bytes"
          # macOS md5 输出格式: MD5 (file) = hash
          MD5=$(md5 "$APK_FILE" | sed 's/.*= //')
          echo "MD5: $MD5"
          echo "path=$APK_FILE" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "size=$(wc -c < "$APK_FILE")" >> $GITHUB_OUTPUT

      - name: 生成 version-info.json
        run: |
          EXPIRE="${{ inputs.expire_days || '7d' }}"
          cat > version-info.json << EOF
          {
            "versionCode": ${{ needs.build-release.outputs.version_code }},
            "versionName": "${{ needs.build-release.outputs.version_name }}",
            "releaseDate": "$(date +%Y-%m-%d)",
            "fileSize": ${{ steps.md5.outputs.size }},
            "md5": "${{ steps.md5.outputs.md5 }}",
            "downloadUrl": "https://shz.al/~csBabyApk",
            "releaseNotes": "v${{ needs.build-release.outputs.version_name }} 更新",
            "forceUpdate": false
          }
          EOF
          cat version-info.json

      - name: 上传版本信息到 shz.al
        env:
          SHZAL_PASSWORD: ${{ secrets.SHZAL_PASSWORD }}
        run: |
          EXPIRE="${{ inputs.expire_days || '7d' }}"
          echo "🔑 SHZAL_PASSWORD 已设置，长度为: ${#SHZAL_PASSWORD}"

          # 先强制删除旧文件（如果存在）
          echo "🔄 尝试删除旧版本信息文件..."
          DELETE_RESP=$(curl -s -X DELETE "https://shz.al/~csBabyLog:${SHZAL_PASSWORD}" || true)
          echo "删除响应: $DELETE_RESP"

          # 等待删除完成
          sleep 3

          # 检查是否成功删除（通过尝试获取现有内容）
          EXISTING_CHECK=$(curl -s -w "%{http_code}" -o /dev/null "https://shz.al/~csBabyLog")
          echo "现有文件检查HTTP状态码: $EXISTING_CHECK"

          # 上传新版本信息
          echo "📤 上传新版本信息..."
          RESP=$(curl -s -X POST \
            -F "n=csBabyLog" \
            -F "e=${EXPIRE}" \
            -F "c=@version-info.json" \
            -F "s=${SHZAL_PASSWORD}" \
            https://shz.al)

          echo "版本信息上传响应: $RESP"

          # 检查响应类型并处理
          if echo "$RESP" | grep -q "Error"; then
            echo "❌ 上传失败: $RESP"
            # 尝试使用替代方法：直接覆盖
            ALT_RESP=$(curl -s -X POST \
              --data-urlencode "n=csBabyLog" \
              --data-urlencode "e=${EXPIRE}" \
              --data-urlencode "content@version-info.json" \
              --data-urlencode "s=${SHZAL_PASSWORD}" \
              https://shz.al)
            echo "备用方法响应: $ALT_RESP"
          else
            echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ 版本信息已上传:', d.get('url',''))" || echo "响应不是有效的JSON: $RESP"
          fi

      - name: 上传 APK 到 shz.al
        env:
          SHZAL_PASSWORD: ${{ secrets.SHZAL_PASSWORD }}
        run: |
          EXPIRE="${{ inputs.expire_days || '7d' }}"
          echo "🔑 SHZAL_PASSWORD 已设置，长度为: ${#SHZAL_PASSWORD}"

          # 先检查现有文件
          echo "🔍 检查现有APK文件..."
          EXISTING_CHECK=$(curl -s -w "%{http_code}" -o /dev/null "https://shz.al/~csBabyApk")
          echo "现有文件检查HTTP状态码: $EXISTING_CHECK"

          # 尝试删除旧文件（如果存在）
          echo "🔄 尝试删除旧APK文件..."
          DELETE_RESP=$(curl -s -X DELETE "https://shz.al/~csBabyApk:${SHZAL_PASSWORD}" || true)
          echo "删除响应: $DELETE_RESP"

          # 等待删除完成
          sleep 3

          # 上传新 APK
          echo "📤 上传新APK..."
          RESP=$(curl -s -X POST \
            -F "n=csBabyApk" \
            -F "e=${EXPIRE}" \
            -F "filename=${{ needs.build-release.outputs.apk_name }}" \
            -F "c=@${{ steps.apk.outputs.path }}" \
            -F "s=${SHZAL_PASSWORD}" \
            https://shz.al)

          echo "APK 上传响应: $RESP"

          # 检查响应类型并处理
          if echo "$RESP" | grep -q "Error"; then
            echo "❌ APK上传失败: $RESP"
            # 尝试使用替代方法：直接覆盖
            ALT_RESP=$(curl -s -X POST \
              -F "n=csBabyApk" \
              -F "e=${EXPIRE}" \
              -F "filename=${{ needs.build-release.outputs.apk_name }}" \
              -F "c=@${{ steps.apk.outputs.path }}" \
              -F "s=${SHZAL_PASSWORD}" \
              https://shz.al)
            echo "备用方法响应: $ALT_RESP"
          else
            echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ APK 已上传:', d.get('url',''))" || echo "响应不是有效的JSON: $RESP"
          fi

      - name: 输出部署摘要
        run: |
          echo "## 🚀 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 字段 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | v${{ needs.build-release.outputs.version_name }} (${{ needs.build-release.outputs.version_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | ${{ needs.build-release.outputs.apk_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MD5 | ${{ steps.md5.outputs.md5 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 版本信息 | https://shz.al/~csBabyLog |" >> $GITHUB_STEP_SUMMARY
          echo "| APK 下载 | https://shz.al/~csBabyApk |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # Job 3: 创建 GitHub Release（打 tag 时触发）
  # ─────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    runs-on: macos-latest
    timeout-minutes: 5
    needs: [ build-release, upload-shzal ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./apk-output

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "客服小秘 v${{ needs.build-release.outputs.version_name }}"
          body: |
            ## 📦 客服小秘 v${{ needs.build-release.outputs.version_name }}

            **版本号：** ${{ needs.build-release.outputs.version_code }}
            **发布日期：** $(date +%Y-%m-%d)

            ### 下载
            - 📥 **直接下载（7天有效）：** https://shz.al/~csBabyApk
            - 📋 **版本信息：** https://shz.al/~csBabyLog

            ### 变更内容
            > 请在此补充本版本的主要变更

          files: ./apk-output/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true