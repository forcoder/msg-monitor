# Test Configuration for Knowledge Search Tests

# Database Configuration
test.database.name=knowledge_test.db
test.database.version=1

# Mock Data Configuration
test.rules.default.count=4
test.rules.fuzzy.matching.enabled=true
test.rules.debounce.delay.ms=300
test.search.max.results=50

# Performance Configuration
test.search.timeout.ms=5000
test.import.timeout.ms=30000
test.export.timeout.ms=10000

# UI Testing Configuration
test.ui.animation.speed.scale=1.0
test.ui.wait.timeouts.short=1000
test.ui.wait.timeouts.long=5000

# Logging Configuration for Tests
logging.level.com.csbaby.kefu.test=DEBUG
logging.format.simple=true

# Mock Service URLs
mock.api.base.url=http://localhost:8080/mock

# Test Data File Paths
test.data.rules.file=test_data/rules.json
test.data.csv.import.file=test_data/import_rules.csv
test.data.excel.import.file=test_data/import_rules.xlsx