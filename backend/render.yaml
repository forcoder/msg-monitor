services:
  - type: web
    name: csBaby-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DATABASE_PATH
        value: /var/data/csBaby.db
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      - name: data
      - mountPath: /var/data
      - sizeGB: 1
